<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Галерея Стасона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000000;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            color: #eef5ff;
        }

        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: breatheGlow 9s infinite alternate ease-in-out;
        }

        .orb1 {
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, #3b2a6b, #1a1040);
            top: -20vh;
            left: -20vw;
            animation-duration: 12s;
            opacity: 0.18;
        }

        .orb2 {
            width: 80vh;
            height: 80vh;
            background: radial-gradient(circle, #4a1e3c, #1e0a1e);
            bottom: -30vh;
            right: -20vw;
            animation-duration: 14s;
            animation-delay: -2s;
            opacity: 0.2;
        }

        .orb3 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, #1e4a4a, #0a2a2a);
            top: 40vh;
            right: 10vw;
            animation-duration: 16s;
            animation-delay: -5s;
            opacity: 0.15;
        }

        .orb4 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #6b4e2a, #2a1e0a);
            bottom: 10vh;
            left: 15vw;
            animation-duration: 18s;
            animation-delay: -3s;
            opacity: 0.12;
        }

        @keyframes breatheGlow {
            0% {
                transform: scale(0.9) translate(0px, 0px);
                opacity: 0.1;
            }
            100% {
                transform: scale(1.4) translate(20px, -20px);
                opacity: 0.28;
            }
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDYiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.2;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            width: 100%;
            backdrop-filter: blur(2px);
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(2.6rem, 10vw, 5rem);
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f0f0ff 0%, #c0b9ff 50%, #a0a5ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(100, 80, 255, 0.3);
        }

        .sub {
            font-size: 1rem;
            margin-top: 0.75rem;
            opacity: 0.7;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .status-panel {
            background: rgba(10, 10, 20, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 0.8rem 1.8rem;
            margin-bottom: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .counter {
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 500;
        }

        .counter span {
            color: #bbf0ff;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .file-card {
            background: rgba(12, 12, 20, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.6rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .file-card:hover {
            transform: translateY(-6px);
            background: rgba(25, 25, 45, 0.85);
            border-color: rgba(210, 180, 255, 0.7);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6), 0 0 12px rgba(140, 100, 220, 0.3);
        }

        .file-icon {
            font-size: 2.8rem;
            margin-bottom: 0.7rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .file-name {
            font-size: 1.25rem;
            font-weight: 600;
            font-family: 'SF Mono', 'Fira Code', monospace;
            word-break: break-all;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        .file-badge {
            margin-top: 0.8rem;
            font-size: 0.7rem;
            opacity: 0.7;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .badge-html {
            background: #e06c2e20;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            border-left: 2px solid #e06c2e;
        }

        .empty-message {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
            backdrop-filter: blur(4px);
            border: 1px dashed rgba(255,255,200,0.3);
            font-size: 1.2rem;
        }

        .empty-message p {
            margin: 0.5rem 0;
        }

        .emoji-hint {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.45;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1.8rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .gallery-grid {
                gap: 1rem;
            }
            .file-card {
                padding: 1.2rem 0.8rem;
            }
            .status-panel {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
        }

        @keyframes softPulse {
            0% { text-shadow: 0 0 0px rgba(200,180,255,0);}
            100% { text-shadow: 0 0 6px rgba(170,140,255,0.3);}
        }
        .file-card:hover .file-name {
            animation: softPulse 0.8s infinite alternate;
        }
    </style>
</head>
<body>

<div class="ambient-glow">
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
    <div class="glow-orb orb3"></div>
    <div class="glow-orb orb4"></div>
</div>
<div class="noise-overlay"></div>

<div class="content">
    <div class="hero">
        <h1>Галерея Стасона</h1>
        <div class="sub">✦ цифровой архив · живые страницы ✦</div>
    </div>

    <div class="status-panel">
        <div class="counter">
            📄 Найдено файлов: <span id="fileCount">0</span>
        </div>
        <div class="refresh-btn" id="manualRefreshBtn" style="background: rgba(30, 30, 50, 0.8); border: 1px solid rgba(255, 220, 150, 0.6); padding: 0.4rem 1.2rem; border-radius: 2rem; font-size: 0.85rem; cursor: pointer;">
            ⟳ Обновить
        </div>
    </div>

    <div id="galleryContainer" class="gallery-grid"></div>
    <footer>✨ Галерея Стасона</footer>
</div>

<script>
    (function() {
        const KNOWN_FILES = [
            "первый мой сайт.html"
        ];

        const galleryContainer = document.getElementById('galleryContainer');
        const fileCountSpan = document.getElementById('fileCount');

        function renderFileList(fileList) {
            galleryContainer.innerHTML = '';

            if (!fileList.length) {
                galleryContainer.innerHTML = `
                    <div class="empty-message" style="grid-column:1/-1;">
                        <div class="emoji-hint">🌌📭🌌</div>
                        <p>Пока нет дополнительных HTML-файлов</p>
                    </div>
                `;
                fileCountSpan.innerText = '0';
                return;
            }

            fileCountSpan.innerText = fileList.length;

            for (let fileName of fileList) {
                const card = document.createElement('a');
                card.className = 'file-card';
                card.href = fileName;
                card.target = '_self';

                const iconSpan = document.createElement('div');
                iconSpan.className = 'file-icon';
                iconSpan.innerHTML = '📄✨';

                const nameSpan = document.createElement('div');
                nameSpan.className = 'file-name';
                nameSpan.innerText = fileName;

                const badgeDiv = document.createElement('div');
                badgeDiv.className = 'file-badge';
                badgeDiv.innerHTML = `<span class="badge-html">🔗 HTML-документ</span> <span>➡️ переход</span>`;

                card.appendChild(iconSpan);
                card.appendChild(nameSpan);
                card.appendChild(badgeDiv);

                galleryContainer.appendChild(card);
            }
        }

        function initGallery() {
            const validFiles = KNOWN_FILES.filter(name => name && typeof name === 'string' && name.trim().length > 0);
            renderFileList(validFiles);
        }

        const refreshBtn = document.getElementById('manualRefreshBtn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', () => initGallery());
        }

        initGallery();
    })();
</script>
</body>
</html>
